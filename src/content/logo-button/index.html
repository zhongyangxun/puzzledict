<style>
  :host {
    --primary: oklch(0.52 0.14 195);
    --surface: oklch(1 0 0);
    --ring: oklch(0.88 0.008 240);
    --shadow: oklch(0 0 0 / 15%);
    --shadow-hover: oklch(0 0 0 / 22%);
    --focus-ring: oklch(0.52 0.14 195);
  }

  :host(.dark) {
    --primary: oklch(0.62 0.14 195);
    --surface: oklch(0.28 0.012 240);
    --ring: oklch(1 0 0 / 14%);
    --shadow: oklch(0 0 0 / 15%);
    --shadow-hover: oklch(0 0 0 / 22%);
    --focus-ring: oklch(0.72 0.14 195);
  }

  .logo-button {
    display: flex;
    box-sizing: border-box;
    width: 32px;
    height: 32px;
    position: fixed;
    z-index: 2147483647;
    align-items: center;
    justify-content: center;
    background-color: var(--surface);
    border: 1px solid var(--ring);
    border-radius: 8px;
    box-shadow: 0 2px 8px var(--shadow);
    color: var(--primary);
    transition:
      box-shadow 0.2s ease,
      transform 0.2s ease;
  }

  .logo-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--shadow-hover);
  }

  .logo-button:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px var(--shadow);
  }

  .logo-button:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .logo-button-icon {
    display: block;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-button {
      transition: none;
    }
    .logo-button:hover {
      transform: none;
    }
    .logo-button:active {
      transform: none;
    }
  }
</style>
