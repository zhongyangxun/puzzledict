<style>
  :host {
    --primary: oklch(0.52 0.14 195);
    --on-primary: oklch(1 0 0);
    --shadow: oklch(0.52 0.14 195 / 35%);
    --shadow-hover: oklch(0.52 0.14 195 / 50%);
  }

  :host(.dark) {
    --primary: oklch(0.62 0.14 195);
    --on-primary: oklch(0.98 0.005 240);
    --shadow: oklch(0.62 0.14 195 / 40%);
    --shadow-hover: oklch(0.62 0.14 195 / 55%);
  }

  .logo-button {
    display: flex;
    box-sizing: border-box;
    width: 32px;
    height: 32px;
    position: fixed;
    z-index: 2147483647;
    align-items: center;
    justify-content: center;
    background-color: var(--primary);
    border: none;
    border-radius: 8px;
    box-shadow: 0 2px 8px var(--shadow);
    color: var(--on-primary);
    transition:
      box-shadow 0.2s ease,
      transform 0.2s ease;
  }

  .logo-button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--shadow-hover);
  }

  .logo-button:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px var(--shadow);
  }

  .logo-button:focus-visible {
    outline: 2px solid var(--on-primary);
    outline-offset: 2px;
  }

  .logo-button-icon {
    display: block;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-button {
      transition: none;
    }
    .logo-button:hover {
      transform: none;
    }
    .logo-button:active {
      transform: none;
    }
  }
</style>
