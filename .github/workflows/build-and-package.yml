name: build and package

# 触发条件：手动在 Actions 页面点击触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v5

      # 安装 Node.js 环境
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm' # 自动缓存 node_modules

      # 安装依赖
      - name: Install dependencies
        run: npm ci

      # 执行 Rollup 打包
      - name: Build
        env:
          NODE_ENV: production
          REQUEST_SIGNATURE_SECRET: ${{ secrets.REQUEST_SIGNATURE_SECRET }}
        run: npm run build

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: puzzledict-v${{ steps.ver.outputs.version }}-${{ github.run_number }}
          path: dist/
          retention-days: 30
          if-no-files-found: error
