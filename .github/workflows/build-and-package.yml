name: build and package

# 触发条件：当你推送到 main 分支，或者手动在 Actions 页面点击触发
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Node.js 环境
      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20' # 建议用 LTS 版本
          cache: 'npm'       # 自动缓存 node_modules，下次跑飞快

      # 安装依赖
      - name: Install dependencies
        run: npm install

      # 执行 Rollup 打包
      - name: Build with Rollup
        run: npm run build

      # 自动压缩 dist 文件夹为 zip
      - name: Zip extension
        run: zip -r select-to-translate.zip dist/

      # 将 zip 包上传为 Artifacts（产物）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: select-to-translate-latest # 下载时的文件名
          path: select-to-translate.zip
